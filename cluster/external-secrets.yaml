# ExternalSecret CRDs — materialize Vault secrets into Kubernetes Secret resources.
# Apply to namespace `beacon`. ESO operator must be running cluster-wide.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: beacon-database
  namespace: beacon
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-cluster
    kind: ClusterSecretStore
  target:
    name: beacon-database
    creationPolicy: Owner
  data:
    - secretKey: BEACON_DATABASE_URL
      remoteRef:
        key: secret/rewire/beacon/database
        property: url
    - secretKey: BEACON_WORKER_DATABASE_URL
      remoteRef:
        key: secret/rewire/beacon/database
        property: worker_url
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: beacon-redis
  namespace: beacon
spec:
  refreshInterval: 1h
  secretStoreRef: { name: vault-cluster, kind: ClusterSecretStore }
  target: { name: beacon-redis }
  data:
    - secretKey: BEACON_REDIS_URL
      remoteRef: { key: secret/rewire/beacon/redis, property: url }
---
