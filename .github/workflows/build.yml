name: Build & Push Container Images

# rewire-beacon — mirror Gitea publish workflow to ghcr.io.
# Single image: rewire-beacon-control-plane (FastAPI V0 skeleton).
# Tags: :<sha> (immutable), :main, :latest (moving).
#
# Aligned with cluster V0 ghcr.io pipeline (rewire-data, rewire-audit-trail, etc.).
# Strategic note (CEO maio/2026): preferencia OSS self-hosted (Distribution v2
# em 192.168.1.110:30500 via .gitea/workflows/publish.yml). ghcr.io is the
# off-cluster mirror until Harbor cluster Fase 3.

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "pyproject.toml"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "pyproject.toml"
      - ".github/workflows/build.yml"

env:
  REGISTRY: ghcr.io
  ORG: rewire-labs
  PLATFORMS: linux/amd64

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + push ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: control-plane
            image: rewire-beacon-control-plane
            dockerfile: apps/control-plane/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.image }}
          tags: |
            type=sha,format=long,prefix=
            type=ref,event=branch
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.source=https://github.com/Rewire-labs/rewire-beacon
            org.opencontainers.image.licenses=Proprietary
            rewire.io/product=beacon
            rewire.io/component=${{ matrix.app }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: false

      - name: Image digest
        if: github.event_name == 'push'
        run: echo "Pushed ${{ matrix.image }} digest=${{ steps.build.outputs.digest }}"
