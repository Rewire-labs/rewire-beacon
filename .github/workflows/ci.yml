name: CI

# rewire-beacon — lint + type-check + tests on PR/push.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: ruff + mypy + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dev deps
        working-directory: apps/control-plane
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        working-directory: apps/control-plane
        run: ruff check src
      - name: MyPy
        working-directory: apps/control-plane
        run: mypy src || true   # V0: not blocking; tighten on V0.1
      - name: PyTest
        working-directory: apps/control-plane
        run: pytest -q ../../tests
