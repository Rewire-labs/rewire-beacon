# BEACON UI — static SPA + /api/ proxy to installer-backend-proxy.
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;

    gzip               on;
    gzip_vary          on;
    gzip_min_length    256;
    gzip_types         text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_comp_level    6;

    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY"   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    location = /healthz {
        access_log off;
        return 200 "ok";
        default_type text/plain;
    }

    # /api/* -> installer-backend-proxy (which fans out to beacon-control-plane internally)
    location /api/ {
        proxy_pass http://installer-backend-proxy.installer.svc.cluster.local:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout                 300s;
    }

    # cache hashed assets aggressively
    location ~* \.(js|css|svg|woff2?|png|jpg|webp|avif)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location / {
        try_files $uri /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
