[alembic]
# BEACON Alembic config — V0 skeleton.
# Per cluster convention: BEACON lives in its own `beacon` schema inside
# the shared cluster `rewire` Postgres database (multi-tenant column-scoped).
script_location = migrations
prepend_sys_path = .
version_path_separator = os
version_table = alembic_version
version_table_schema = beacon

# Default URL — overridden by BEACON_DATABASE_URL / DATABASE_URL via env.py.
sqlalchemy.url = postgresql+psycopg://rewire_beacon_svc:dev-only-not-prod@cluster-dev-postgres:5432/rewire

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
