openapi: 3.1.0
info:
  title: Rewire Notify
  version: 0.1.0
  description: 'Unified notification fanout — Slack, email, webhook, push.


    Generated by ``tools.openapi.bootstrap_specs`` until the live FastAPI app is wired
    into CI''s spec dumper.


    Part of the [Rewire ecosystem](https://docs.rewirelabs.dev) — slug `notify`.'
  x-rewire-slug: notify
  x-rewire-bootstrap: true
  contact:
    name: Rewire Labs Platform Team
    email: platform@rewirelabs.dev
    url: https://docs.rewirelabs.dev
  license:
    name: Proprietary
    url: https://rewirelabs.dev/legal/api-terms
  termsOfService: https://rewirelabs.dev/legal/api-terms
paths:
  /healthz:
    get:
      summary: Liveness probe
      description: Returns 200 once the process is up. Used by Kubernetes liveness.
      operationId: getHealthz
      tags:
      - health
      responses:
        '200':
          description: Process alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
              example:
                status: ok
        '400': &id001
          description: RFC 7807 problem+json error envelope.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: https://docs.rewirelabs.dev/errors/validation
                title: Validation failed
                status: 422
                detail: field 'tenant_id' is required
                instance: /admin/v1/tenants
                request_id: req_01HZ8Y7K6Q
        '401': *id001
        '403': *id001
        '404': *id001
        '409': *id001
        '422': *id001
        '429': *id001
        '500': *id001
      security: []
  /readyz:
    get:
      summary: Readiness probe
      description: Returns 200 only when DB + Redis + Kafka are reachable.
      operationId: getReadyz
      tags:
      - health
      responses:
        '200':
          description: Ready to accept traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
              example:
                status: ready
        '400': *id001
        '401': *id001
        '403': *id001
        '404': *id001
        '409': *id001
        '422': *id001
        '429': *id001
        '500': *id001
      security: []
  /v1/whoami:
    get:
      summary: Resolve current identity
      description: Returns the user/tenant resolved from the Bearer JWT.  Useful to
        verify the token is wired up correctly during SDK setup.
      operationId: getWhoami
      tags:
      - auth
      responses:
        '200':
          description: Identity envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Identity'
              example:
                user_id: u_01HZ8Y7K6Q
                tenant_id: t_01HZ8Y7K6Q
                roles:
                - admin
                email: alessandro@profitor.com.br
        '400': *id001
        '401': *id001
        '403': *id001
        '404': *id001
        '409': *id001
        '422': *id001
        '429': *id001
        '500': *id001
  /v1/jobs:
    get:
      summary: List async jobs
      description: Paginated list of jobs scoped to the caller's tenant.
      operationId: listJobs
      tags:
      - jobs
      parameters:
      - name: cursor
        in: query
        schema:
          type: string
        required: false
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
        required: false
      - name: status
        in: query
        schema:
          type: string
          enum:
          - queued
          - running
          - succeeded
          - failed
        required: false
      responses:
        '200':
          description: Page of jobs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobPage'
              example:
                items:
                - id: job_01HZ8Y7K6Q
                  status: running
                  kind: backup.create
                  created_at: '2026-05-18T12:00:00Z'
                next_cursor: null
        '400': *id001
        '401': *id001
        '403': *id001
        '404': *id001
        '409': *id001
        '422': *id001
        '429': *id001
        '500': *id001
  /v1/jobs/{job_id}:
    get:
      summary: Get one job
      operationId: getJob
      tags:
      - jobs
      parameters:
      - name: job_id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          description: Job detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
              example:
                id: job_01HZ8Y7K6Q
                status: running
                kind: backup.create
                progress: 42
        '400': *id001
        '401': *id001
        '403': *id001
        '404': *id001
        '409': *id001
        '422': *id001
        '429': *id001
        '500': *id001
components:
  schemas:
    Health:
      type: object
      required:
      - status
      properties:
        status:
          type: string
    Identity:
      type: object
      required:
      - user_id
      - tenant_id
      properties:
        user_id:
          type: string
        tenant_id:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
          description: RBAC roles from the ``rewire.roles`` JWT claim.
    Job:
      type: object
      required:
      - id
      - status
      - kind
      properties:
        id:
          type: string
          description: ULID prefixed ``job_``.
        status:
          type: string
          enum:
          - queued
          - running
          - succeeded
          - failed
        kind:
          type: string
          description: Dotted job kind, e.g. ``backup.create``.
        progress:
          type: integer
          minimum: 0
          maximum: 100
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        error:
          type: string
    JobPage:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Job'
        next_cursor:
          type:
          - string
          - 'null'
    ProblemDetail:
      type: object
      description: RFC 7807 problem+json error body.
      required:
      - type
      - title
      - status
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        request_id:
          type: string
  securitySchemes:
    BearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Authentik-issued JWT (RS256).  Tokens carry ``sub``, ``tenant_id``
        and Rewire RBAC roles (``rewire.roles`` claim).  Internal calls between services
        use HS256 HMAC tokens under the same ``Authorization`` header.
    CloudflareAccess:
      type: apiKey
      in: header
      name: Cf-Access-Jwt-Assertion
      description: Cloudflare Access JWT injected by the Cloudflare edge.  Required
        on every customer-facing endpoint when running in production.
tags:
- name: email
  description: Rewire Notify — email surface.
- name: notifications
  description: Rewire Notify — notifications surface.
- name: slack
  description: Rewire Notify — slack surface.
- name: webhook
  description: Rewire Notify — webhook surface.
servers:
- url: https://api.rewirelabs.dev/notify/v1
  description: Production (Kong gateway, tenant-scoped JWT)
- url: https://api.staging.rewirelabs.dev/notify/v1
  description: Staging
- url: http://localhost:8000/notify/v1
  description: Local dev (control plane on port 8000)
security:
- BearerJWT: []
