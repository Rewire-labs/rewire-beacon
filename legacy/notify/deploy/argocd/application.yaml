# Standalone ArgoCD Application — useful for ad-hoc kubectl apply when
# the cluster's main ApplicationSet (argocd/applicationsets/observability.yaml)
# is unavailable. In production this manifest is redundant with the
# ApplicationSet entry; kept here for completeness and local sync tests.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rewire-notify
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: rewire-cluster
    rewire.io/tier: observability
spec:
  project: observability
  source:
    repoURL: https://github.com/Rewire-labs/rewire_cluster.git
    targetRevision: main
    path: services/rewire-notify/deploy/helm/rewire-notify
    helm:
      releaseName: rewire-notify
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
