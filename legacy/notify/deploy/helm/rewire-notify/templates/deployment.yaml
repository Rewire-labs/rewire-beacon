apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: rewire-notify
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: rewire-cluster
    app.kubernetes.io/component: notify
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: rewire-notify
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rewire-notify
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: rewire-cluster
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.port }}"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: notify
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: REWIRE_NOTIFY_ENVIRONMENT
              value: {{ .Values.config.environment | quote }}
            - name: REWIRE_NOTIFY_LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: REWIRE_NOTIFY_HTTP_PORT
              value: {{ .Values.service.port | quote }}
            - name: REWIRE_NOTIFY_ENABLE_KAFKA_CONSUMER
              value: {{ .Values.config.enableKafkaConsumer | quote }}
            - name: REWIRE_NOTIFY_ENABLE_BOT_POLLER
              value: {{ .Values.config.enableBotPoller | quote }}
            - name: REWIRE_NOTIFY_ENABLE_DAILY_DIGEST
              value: {{ .Values.config.enableDailyDigest | quote }}
            - name: REWIRE_NOTIFY_DAILY_DIGEST_CRON_HOUR_BRT
              value: {{ .Values.config.dailyDigestHourBRT | quote }}
            - name: REWIRE_NOTIFY_DAILY_DIGEST_CRON_MINUTE_BRT
              value: {{ .Values.config.dailyDigestMinuteBRT | quote }}
            - name: REWIRE_NOTIFY_KAFKA_BROKERS
              value: {{ .Values.config.kafkaBrokers | quote }}
            - name: REWIRE_NOTIFY_KAFKA_TOPIC_EVENTS
              value: {{ .Values.config.kafkaTopicEvents | quote }}
            - name: REWIRE_NOTIFY_KAFKA_CONSUMER_GROUP
              value: {{ .Values.config.kafkaConsumerGroup | quote }}
            - name: REWIRE_NOTIFY_LAGO_API_URL
              value: {{ .Values.config.lagoApiUrl | quote }}
            - name: REWIRE_NOTIFY_FOUNDRY_API_URL
              value: {{ .Values.config.foundryApiUrl | quote }}
            - name: REWIRE_NOTIFY_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.telegramSecretName }}
                  key: bot_token
            - name: REWIRE_NOTIFY_CHAT_ID_PRIVATE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.telegramSecretName }}
                  key: chat_id_private
            - name: REWIRE_NOTIFY_CHAT_ID_GROUP
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.telegramSecretName }}
                  key: chat_id_group
            - name: REWIRE_NOTIFY_ALERTMANAGER_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalSecrets.hmacSecretName }}
                  key: shared_secret
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: rewire-notify
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: rewire-notify
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- if .Values.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: rewire-notify
    release: prometheus-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: rewire-notify
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    - port: http
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      path: /metrics
{{- end }}
{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rewire-notify
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    # Telegram API (api.telegram.org — 149.154.167.220/24 ranges).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
{{- end }}
