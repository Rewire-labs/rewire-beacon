# rewire-notify Helm values.
# Defaults mirror the architecture spec; secrets come from the
# ExternalSecret `rewire-notify-telegram` provisioned out-of-band.

replicaCount: 1

image:
  registry: harbor.internal.rewirelabs.dev
  repository: rewire/rewire-notify
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# Service account — uses the default observability SA unless overridden.
serviceAccount:
  create: true
  name: rewire-notify

# Pod security context per the cluster baseline.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Environment toggles (override via values-staging.yaml / values-dev.yaml).
config:
  environment: production
  logLevel: INFO
  enableKafkaConsumer: true
  enableBotPoller: true
  enableDailyDigest: true
  dailyDigestHourBRT: 9
  dailyDigestMinuteBRT: 0
  kafkaBrokers: "redpanda.kafka.svc.cluster.local:9092"
  kafkaTopicEvents: "cluster.events.global"
  kafkaConsumerGroup: "rewire-notify-v1"
  lagoApiUrl: "http://lago-api.lago.svc.cluster.local:3000"
  foundryApiUrl: "http://foundry-cp.foundry.svc.cluster.local:8080"

# Secret reference for the Telegram bot token + chat IDs.
# Created by ExternalSecret `rewire-notify-telegram`.
externalSecrets:
  telegramSecretName: rewire-notify-telegram
  hmacSecretName: rewire-notify-hmac

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

networkPolicy:
  enabled: true
